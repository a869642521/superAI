version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: starpath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: starpath
      POSTGRES_PASSWORD: starpath_dev_2024
      POSTGRES_DB: starpath
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: starpath-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
